<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Restaurante — Da Mesa</title>
  <link rel="manifest" href="../assets/manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#faf7f2; --card:#fff; --text:#1c1612; --muted:#7a6a5e; --accent:#c0392b; --border:#e8dfd4; --radius:12px; --green:#2e7d32; --amber:#f57f17; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
    a { color: inherit; text-decoration: none; }

    nav { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; background:#fff; border-bottom:1px solid var(--border); }
    .logo { font-family:Georgia,serif; font-size:22px; font-weight:normal; }
    .logo span { color:var(--accent); }
    .nav-right { display:flex; gap:16px; align-items:center; font-size:14px; color:var(--muted); }
    .rest-name { font-weight:600; color:var(--text); }
    .btn-sm { background:none; border:1px solid var(--border); padding:7px 14px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--muted); }
    .btn-sm:hover { border-color:var(--text); color:var(--text); }

    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px 60px; }

    /* STATS */
    .stats { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:16px; margin-bottom:36px; }
    .stat-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
    .stat-label { font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:8px; }
    .stat-value { font-family:Georgia,serif; font-size:32px; font-weight:normal; }

    /* DATE PICKER */
    .toolbar { display:flex; align-items:center; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
    .toolbar h2 { font-family:Georgia,serif; font-size:22px; font-weight:normal; flex:1; }
    .toolbar input[type=date] { padding:9px 14px; border:1px solid var(--border); border-radius:8px; font-size:14px; background:#fff; outline:none; }
    .live-dot { width:8px; height:8px; border-radius:50%; background:#4caf50; display:inline-block; margin-right:6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* BOOKINGS TABLE */
    .table-wrap { background:#fff; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    thead th { padding:12px 16px; text-align:left; font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); border-bottom:1px solid var(--border); background:var(--bg); }
    tbody td { padding:14px 16px; font-size:14px; border-bottom:1px solid var(--border); }
    tbody tr:last-child td { border-bottom:none; }
    tbody tr:hover td { background: #faf7f2; }

    .status { padding:3px 10px; border-radius:100px; font-size:12px; font-weight:500; }
    .status-confirmed { background:#e8f5e9; color:var(--green); }
    .status-pending { background:#fff8e1; color:var(--amber); }
    .status-cancelled { background:#fce4ec; color:#c62828; }
    .status-completed { background:#e3f2fd; color:#1565c0; }
    .status-no_show { background:#f3e5f5; color:#6a1b9a; }

    .action-btn { border:none; border-radius:6px; padding:5px 10px; font-size:12px; cursor:pointer; margin-right:4px; }
    .btn-confirm { background:#e8f5e9; color:var(--green); }
    .btn-cancel { background:#fce4ec; color:#c62828; }

    .empty { text-align:center; padding:48px; color:var(--muted); }

    footer { text-align:center; padding:40px 24px; color:var(--muted); font-size:13px; border-top:1px solid var(--border); }
    footer strong { color:var(--text); font-family:Georgia,serif; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Da <span>Mesa</span></a>
  <div class="nav-right">
    <span class="rest-name" id="nav-rest-name">A carregar...</span>
    <button class="btn-sm" onclick="handleSignOut()">Sair</button>
  </div>
</nav>

<div class="page-wrap">
  <div class="stats" id="stats-row">
    <div class="stat-card"><div class="stat-label">Hoje</div><div class="stat-value" id="stat-today">—</div></div>
    <div class="stat-card"><div class="stat-label">Esta semana</div><div class="stat-value" id="stat-week">—</div></div>
    <div class="stat-card"><div class="stat-label">Confirmadas</div><div class="stat-value" id="stat-confirmed">—</div></div>
    <div class="stat-card"><div class="stat-label">Pessoas hoje</div><div class="stat-value" id="stat-covers">—</div></div>
  </div>

  <div class="toolbar">
    <h2><span class="live-dot"></span>Reservas</h2>
    <input type="date" id="date-picker" onchange="loadBookings()" />
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Hora</th>
          <th>Nome</th>
          <th>Pessoas</th>
          <th>Contacto</th>
          <th>Pedidos</th>
          <th>Estado</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="bookings-tbody">
        <tr><td colspan="7" class="empty">A carregar...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<footer>
  <strong>Da Mesa</strong> — Painel do Restaurante
</footer>

<script type="module">
  import { guardRoute, signOut } from '../src/js/auth.js'
  import { getRestaurantBookings, updateBookingStatus, subscribeToBookings } from '../src/js/bookings.js'
  import { getRestaurantStats } from '../src/js/analytics.js'
  import { supabase } from '../src/js/supabase.js'

  const profile = await guardRoute()
  if (!profile) return

  // Get this owner's restaurant
  const { data: restaurant } = await supabase
    .from('restaurants')
    .select('*')
    .eq('owner_id', profile.id)
    .single()

  if (!restaurant) {
    document.querySelector('.page-wrap').innerHTML = '<p style="color:var(--muted);padding:40px 0">Nenhum restaurante associado à tua conta. Contacta o suporte.</p>'
    return
  }

  document.getElementById('nav-rest-name').textContent = restaurant.name
  document.title = `${restaurant.name} — Da Mesa`

  // Set date picker to today
  const today = new Date().toISOString().split('T')[0]
  document.getElementById('date-picker').value = today

  // Load stats
  const { stats } = await getRestaurantStats(restaurant.id, 7)
  if (stats) {
    document.getElementById('stat-week').textContent = stats.total
    document.getElementById('stat-confirmed').textContent = stats.confirmed
  }

  // Load today bookings for stat cards
  const { bookings: todayBookings } = await getRestaurantBookings(restaurant.id, today)
  document.getElementById('stat-today').textContent = todayBookings?.length ?? 0
  document.getElementById('stat-covers').textContent = todayBookings?.reduce((s, b) => s + b.party_size, 0) ?? 0

  // Load bookings for selected date
  window.loadBookings = async function() {
    const date = document.getElementById('date-picker').value
    const { bookings } = await getRestaurantBookings(restaurant.id, date)
    renderBookings(bookings ?? [])
  }

  function renderBookings(bookings) {
    const tbody = document.getElementById('bookings-tbody')
    if (!bookings.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty">Sem reservas para este dia.</td></tr>'
      return
    }
    tbody.innerHTML = bookings.map(b => `
      <tr id="row-${b.id}">
        <td><strong>${b.booking_time?.slice(0,5)}</strong></td>
        <td>${b.diner_name}</td>
        <td>${b.party_size}</td>
        <td style="font-size:12px;color:var(--muted)">${b.diner_phone}<br>${b.diner_email}</td>
        <td style="font-size:12px;color:var(--muted)">${b.special_requests || '—'}</td>
        <td><span class="status status-${b.status}">${translateStatus(b.status)}</span></td>
        <td>
          ${b.status === 'pending' ? `<button class="action-btn btn-confirm" onclick="updateStatus('${b.id}','confirmed')">Confirmar</button>` : ''}
          ${b.status !== 'cancelled' && b.status !== 'completed' ? `<button class="action-btn btn-cancel" onclick="updateStatus('${b.id}','cancelled')">Cancelar</button>` : ''}
        </td>
      </tr>
    `).join('')
  }

  window.updateStatus = async function(bookingId, status) {
    await updateBookingStatus(bookingId, status)
    loadBookings()
  }

  function translateStatus(s) {
    return { pending:'Pendente', confirmed:'Confirmada', cancelled:'Cancelada', completed:'Concluída', no_show:'Não apareceu' }[s] ?? s
  }

  // Real-time updates
  subscribeToBookings(restaurant.id, () => loadBookings())

  await loadBookings()

  window.handleSignOut = signOut
</script>

</body>
</html>
