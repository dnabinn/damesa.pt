<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cozinhas — Da Mesa</title>
  <meta name="description" content="Explore os melhores restaurantes de Lisboa por tipo de cozinha." />
  <link rel="manifest" href="/assets/manifest.json" />
  <link rel="icon" type="image/png" href="/assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />
  <link rel="canonical" href="https://damesa.pt/cozinhas.html" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#faf7f2; --card:#fff; --text:#1c1612; --muted:#7a6a5e; --accent:#c0392b; --border:#e8dfd4; --radius:12px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
    a { color: inherit; text-decoration: none; }
    nav { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; background:#fff; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
    .logo { font-family:Georgia,serif; font-size:22px; font-weight:normal; }
    .logo span { color:var(--accent); }
    .nav-links { display:flex; gap:24px; align-items:center; font-size:14px; color:var(--muted); }
    .nav-cta { background:var(--text); color:#fff !important; padding:8px 18px; border-radius:8px; font-size:13px; }

    .page-header { padding:48px 24px 40px; max-width:1100px; margin:0 auto; }
    .page-header h1 { font-family:Georgia,serif; font-size:36px; font-weight:normal; margin-bottom:8px; }
    .page-header p { color:var(--muted); }

    .cuisine-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:16px; padding:0 24px 60px; max-width:1100px; margin:0 auto; }
    .cuisine-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:28px 24px; cursor:pointer; transition:transform 0.15s, box-shadow 0.15s; display:flex; flex-direction:column; gap:8px; }
    .cuisine-card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.08); }
    .cuisine-icon { font-size:32px; }
    .cuisine-name { font-family:Georgia,serif; font-size:20px; font-weight:normal; }
    .cuisine-count { font-size:13px; color:var(--muted); }

    footer { text-align:center; padding:40px 24px; color:var(--muted); font-size:13px; border-top:1px solid var(--border); }
    footer strong { color:var(--text); font-family:Georgia,serif; }
    /* Loading */
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { display:inline-flex; align-items:center; gap:8px; opacity:0.7; }
    .loading-text::after { content:''; display:inline-block; width:12px; height:12px; border:1.5px solid currentColor; border-top-color:transparent; border-radius:50%; animation:spin 0.7s linear infinite; flex-shrink:0; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Da <span>Mesa</span></a>
  <div class="nav-links">
    <a href="restaurantes.html">Restaurantes</a>
    <a href="cozinhas.html">Cozinhas</a>
    <a href="login.html" class="nav-cta">Entrar</a>
  </div>
</nav>

<div class="page-header">
  <h1>Explorar por cozinha</h1>
  <p>Descobre os melhores restaurantes de Lisboa por tipo de cozinha.</p>
</div>

<div class="cuisine-grid" id="cuisine-grid"></div>

<footer>
  <strong>Da Mesa</strong> — Reservas de restaurantes em Lisboa · <a href="mailto:ola@damesa.pt">ola@damesa.pt</a> · <a href="/pages/owner-login.html">Portal restaurante</a> · <a href="/pages/privacy.html">Privacidade</a> · <a href="/pages/terms.html">Termos</a>
</footer>

<script type="module">
  import { initCookieBanner } from '/src/js/cookies.js'
  initCookieBanner()

  const CUISINES = [
    { name:'Portuguesa', icon:'🍖' }, { name:'Nepalesa', icon:'🏔️' },
    { name:'Indiana', icon:'🍛' },    { name:'Italiana', icon:'🍝' },
    { name:'Japonesa', icon:'🍣' },   { name:'Chinesa', icon:'🥢' },
    { name:'Mediterrânea', icon:'🫒' },{ name:'Grelhados', icon:'🥩' },
    { name:'Marisco', icon:'🦞' },    { name:'Fusão', icon:'🌏' },
    { name:'Americana', icon:'🍔' },  { name:'Francesa', icon:'🥐' },
    { name:'Espanhola', icon:'🥘' },  { name:'Vegana', icon:'🥗' },
    { name:'Petiscos', icon:'🫙' },   { name:'Contemporânea', icon:'✨' },
    { name:'Brasileira', icon:'🌿' }, { name:'Árabe', icon:'🧆' },
    { name:'Tailandesa', icon:'🌶️' },{ name:'Mexicana', icon:'🌮' },
  ]

  document.getElementById('cuisine-grid').innerHTML = CUISINES.map(c => `
    <a class="cuisine-card" href="/pages/restaurantes.html?cuisine=${encodeURIComponent(c.name)}">
      <div class="cuisine-icon">${c.icon}</div>
      <div class="cuisine-name">${c.name}</div>
    </a>
  `).join('')
</script>

</body>
</html>
