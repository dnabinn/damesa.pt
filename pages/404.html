<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada — Da Mesa</title>
  <meta name="robots" content="noindex" />
  <link rel="manifest" href="/assets/manifest.json" />
  <link rel="icon" href="/assets/icons/icon-192.png" />
  <meta name="theme-color" content="#1c1612" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#faf7f2; --card:#fff; --text:#1c1612; --muted:#7a6a5e; --accent:#c0392b; --border:#e8dfd4; --radius:12px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    a { color: inherit; text-decoration: none; }
    nav { display:flex; align-items:center; padding:16px 24px; background:#fff; border-bottom:1px solid var(--border); }
    .logo { font-family:Georgia,serif; font-size:22px; font-weight:normal; }
    .logo span { color:var(--accent); }
    main { flex:1; display:flex; align-items:center; justify-content:center; padding:48px 24px; }
    .content { text-align:center; max-width:440px; }
    .num { font-family:Georgia,serif; font-size:108px; color:var(--border); line-height:1; margin-bottom:8px; letter-spacing:-4px; }
    h1 { font-family:Georgia,serif; font-size:26px; font-weight:normal; margin-bottom:12px; }
    p { color:var(--muted); font-size:15px; line-height:1.7; margin-bottom:32px; }
    .btn { display:inline-block; padding:12px 28px; background:var(--text); color:#fff; border-radius:10px; font-size:14px; transition:opacity 0.15s; }
    .btn:hover { opacity:0.85; }
    .links { margin-top:20px; display:flex; gap:24px; justify-content:center; font-size:14px; color:var(--muted); }
    .links a:hover { color:var(--text); }
    footer { text-align:center; padding:24px; color:var(--muted); font-size:13px; border-top:1px solid var(--border); }
    footer strong { font-family:Georgia,serif; color:var(--text); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Da <span>Mesa</span></a>
</nav>
<main>
  <div class="content">
    <div class="num">404</div>
    <h1>Página não encontrada</h1>
    <p>A página que procuras não existe ou foi movida.<br>Volta ao início para encontrar o teu restaurante favorito.</p>
    <a href="/" class="btn">Voltar ao início</a>
    <div class="links">
      <a href="/pages/restaurantes.html">Ver restaurantes</a>
      <a href="/pages/login.html">Entrar</a>
    </div>
  </div>
</main>
<footer>
  <strong>Da Mesa</strong> — Reservas de restaurantes em Lisboa
</footer>
</body>
</html>
