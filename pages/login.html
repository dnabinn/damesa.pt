<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Da Mesa</title>
  <link rel="manifest" href="../assets/manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#faf7f2; --card:#fff; --text:#1c1612; --muted:#7a6a5e; --accent:#c0392b; --border:#e8dfd4; --radius:12px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    a { color: inherit; text-decoration: none; }
    nav { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; background:#fff; border-bottom:1px solid var(--border); }
    .logo { font-family:Georgia,serif; font-size:22px; font-weight:normal; }
    .logo span { color:var(--accent); }

    .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .auth-box { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; width: 100%; max-width: 400px; }
    .auth-title { font-family: Georgia, serif; font-size: 26px; font-weight: normal; margin-bottom: 6px; }
    .auth-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

    /* TABS */
    .tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 1px solid var(--border); }
    .tab { padding: 10px 0; margin-right: 24px; font-size: 14px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
    .tab.active { color: var(--text); border-bottom-color: var(--text); }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* FORM */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; }
    .form-group input:focus { border-color: var(--text); }

    .btn-primary { width: 100%; padding: 13px; background: var(--text); color: #fff; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; margin-top: 4px; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .btn-google { width: 100%; padding: 12px; background: #fff; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.15s; }
    .btn-google:hover { background: var(--bg); }
    .btn-google svg { width: 18px; height: 18px; }

    .error-msg { background: #fdf0ef; border: 1px solid #f5c6c3; color: #c0392b; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
    .error-msg.show { display: block; }

    footer { text-align:center; padding:24px; color:var(--muted); font-size:12px; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Da <span>Mesa</span></a>
</nav>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-title">Bem-vindo</div>
    <div class="auth-sub">Entra para gerir as tuas reservas</div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Entrar</div>
      <div class="tab" onclick="switchTab('register')">Criar conta</div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <!-- LOGIN -->
    <div class="tab-pane active" id="pane-login">
      <button class="btn-google" onclick="handleGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuar com Google
      </button>

      <div class="divider">ou</div>

      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="email@exemplo.pt" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary">Entrar</button>
      </form>
    </div>

    <!-- REGISTER -->
    <div class="tab-pane" id="pane-register">
      <button class="btn-google" onclick="handleGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuar com Google
      </button>

      <div class="divider">ou</div>

      <form id="register-form">
        <div class="form-group">
          <label>Nome completo</label>
          <input type="text" name="fullname" placeholder="O seu nome" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="email@exemplo.pt" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Mínimo 8 caracteres" minlength="8" required />
        </div>
        <button type="submit" class="btn-primary">Criar conta</button>
      </form>
    </div>
  </div>
</div>

<footer>Ao entrar, aceitas os <a href="#" style="color:var(--text)">Termos de Serviço</a> da Da Mesa.</footer>

<script type="module">
  import { signInWithGoogle, signInWithEmail, signUpWithEmail, getCurrentProfile } from '../src/js/auth.js'
  import { supabase } from '../src/js/supabase.js'

  // If already logged in, redirect
  const profile = await getCurrentProfile()
  if (profile) redirectByRole(profile)

  function showError(msg) {
    const el = document.getElementById('error-msg')
    el.textContent = msg
    el.classList.add('show')
  }

  window.handleGoogle = () => signInWithGoogle()

  window.switchTab = function(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')))
    document.getElementById('pane-login').classList.toggle('active', tab === 'login')
    document.getElementById('pane-register').classList.toggle('active', tab === 'register')
    document.getElementById('error-msg').classList.remove('show')
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault()
    const btn = e.target.querySelector('button[type=submit]')
    btn.disabled = true; btn.textContent = 'A entrar...'
    const { user, error } = await signInWithEmail(e.target.email.value, e.target.password.value)
    if (error) { showError(error.message); btn.disabled = false; btn.textContent = 'Entrar'; return }
    const { data: profile } = await supabase.from('profiles').select('role').eq('id', user.id).single()
    redirectByRole(profile)
  })

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault()
    const btn = e.target.querySelector('button[type=submit]')
    btn.disabled = true; btn.textContent = 'A criar conta...'
    const { user, error } = await signUpWithEmail(e.target.email.value, e.target.password.value, e.target.fullname.value)
    if (error) { showError(error.message); btn.disabled = false; btn.textContent = 'Criar conta'; return }
    window.location.href = 'dashboard.html'
  })

  function redirectByRole(profile) {
    if (!profile) return
    // If there's a ?return= param, go there instead
    const returnUrl = new URLSearchParams(window.location.search).get('return')
    if (returnUrl) { window.location.href = decodeURIComponent(returnUrl); return }
    // super_admin goes to dashboard (customer view) by default from public login
    // Only owner-dashboard for restaurant owners
    if (profile.role === 'restaurant_owner') window.location.href = '/owner-dashboard.html'
    else window.location.href = '/dashboard.html'
  }
</script>

<!-- PWA Service Worker -->
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {})</script>

</body>
</html>
