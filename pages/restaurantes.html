<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurantes em Lisboa — Da Mesa</title>
  <meta name="description" content="Todos os restaurantes em Lisboa com reserva instantânea. Filtra por cozinha, preço e localização." />
  <link rel="manifest" href="/assets/manifest.json" />
  <link rel="icon" type="image/png" href="/assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />
  <link rel="canonical" href="https://damesa.pt/restaurantes.html" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#faf7f2; --card:#fff; --text:#1c1612; --muted:#7a6a5e; --accent:#c0392b; --border:#e8dfd4; --radius:12px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
    a { color: inherit; text-decoration: none; }
    nav { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; background:#fff; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
    .logo { font-family:Georgia,serif; font-size:22px; font-weight:normal; }
    .logo span { color:var(--accent); }
    .nav-links { display:flex; gap:24px; align-items:center; font-size:14px; color:var(--muted); }
    .nav-cta { background:var(--text); color:#fff !important; padding:8px 18px; border-radius:8px; font-size:13px; }

    .page-header { padding:48px 24px 32px; max-width:1100px; margin:0 auto; }
    .page-header h1 { font-family:Georgia,serif; font-size:36px; font-weight:normal; margin-bottom:8px; }
    .page-header p { color:var(--muted); }

    .filters { padding:0 24px 24px; max-width:1100px; margin:0 auto; display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    .filter-input { padding:10px 16px; border:1px solid var(--border); border-radius:8px; font-size:14px; background:#fff; outline:none; }
    .filter-input:focus { border-color: var(--text); }
    select.filter-input { cursor:pointer; }

    .search-wrap { position:relative; flex:1; min-width:200px; }
    .search-wrap .filter-input { width:100%; }
    .suggestions { position:absolute; top:calc(100% + 4px); left:0; right:0; background:#fff; border:1px solid var(--border); border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,0.10); z-index:200; overflow:hidden; display:none; }
    .suggestions.open { display:block; }
    .sug-section { padding:8px 0 4px; }
    .sug-label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); padding:0 14px 4px; }
    .sug-item { display:flex; align-items:center; gap:10px; padding:9px 14px; cursor:pointer; font-size:14px; transition:background 0.1s; }
    .sug-item:hover { background:var(--bg); }
    .sug-item .sug-icon { font-size:16px; width:22px; text-align:center; flex-shrink:0; }
    .sug-item .sug-sub { font-size:12px; color:var(--muted); margin-left:auto; }
    .sug-thumb { width:40px; height:40px; border-radius:6px; background:#e8dfd4 center/cover; flex-shrink:0; }
    .sug-info { flex:1; min-width:0; }
    .sug-info .sug-name { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sug-info .sug-meta { font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .chips { display:flex; gap:8px; flex-wrap:wrap; padding:0 24px 32px; max-width:1100px; margin:0 auto; }
    .chip { padding:7px 16px; border:1px solid var(--border); border-radius:100px; font-size:13px; cursor:pointer; background:#fff; transition:all 0.15s; }
    .chip:hover, .chip.active { background:var(--text); color:#fff; border-color:var(--text); }

    .grid-wrap { padding:0 24px 60px; max-width:1100px; margin:0 auto; }
    .results-count { font-size:14px; color:var(--muted); margin-bottom:20px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:20px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:transform 0.15s, box-shadow 0.15s; }
    .card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.08); }
    .card-img { height:180px; background:#e8dfd4; background-size:cover; background-position:center; }
    .card-body { padding:16px; }
    .card-name { font-size:17px; font-weight:600; margin-bottom:6px; }
    .card-meta { font-size:13px; color:var(--muted); display:flex; gap:10px; flex-wrap:wrap; }
    .badge { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:2px 8px; font-size:11px; }

    footer { text-align:center; padding:40px 24px; color:var(--muted); font-size:13px; border-top:1px solid var(--border); }
    footer strong { color:var(--text); font-family:Georgia,serif; }
    /* Loading */
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { display:inline-flex; align-items:center; gap:8px; opacity:0.7; }
    .loading-text::after { content:''; display:inline-block; width:12px; height:12px; border:1.5px solid currentColor; border-top-color:transparent; border-radius:50%; animation:spin 0.7s linear infinite; flex-shrink:0; }
  </style>
</head>
<body>

<nav>
  <a href="/pages/index.html" class="logo">Da <span>Mesa</span></a>
  <div class="nav-links">
    <a href="/pages/restaurantes.html">Restaurantes</a>
    <a href="/pages/cozinhas.html">Cozinhas</a>
    <a href="/pages/login.html" class="nav-cta" id="nav-login-btn">Entrar</a>
  </div>
</nav>
<script type="module">
  import { supabase } from '/src/js/supabase.js'
  const { data: { session } } = await supabase.auth.getSession()
  if (session) {
    const btn = document.getElementById('nav-login-btn')
    btn.textContent = 'A minha conta'
    btn.href = '/pages/dashboard.html'
  }
</script>

<div class="page-header">
  <h1>Restaurantes em Lisboa</h1>
  <p>Reserva instantânea, sem taxas.</p>
</div>

<div class="filters">
  <div class="search-wrap">
    <input class="filter-input" id="search" type="text" placeholder="Pesquisar restaurante ou cozinha..." autocomplete="off" />
    <div class="suggestions" id="suggestions"></div>
  </div>
  <select class="filter-input" id="price-filter" onchange="applyFilters()">
    <option value="">Preço: todos</option>
    <option value="€">€ — Económico</option>
    <option value="€€">€€ — Moderado</option>
    <option value="€€€">€€€ — Caro</option>
    <option value="€€€€">€€€€ — Fine dining</option>
  </select>
</div>

<div class="chips" id="cuisine-chips"></div>

<div class="grid-wrap">
  <div class="results-count" id="results-count"></div>
  <div class="grid" id="restaurants-grid">
    <p style="color:var(--muted)"><span class="loading-text">A carregar</span></p>
  </div>
</div>

<footer>
  <strong>Da Mesa</strong> — Reservas de restaurantes em Lisboa · <a href="mailto:ola@damesa.pt">ola@damesa.pt</a> · <a href="/pages/login.html">Entrar como restaurante</a> · <a href="/pages/privacy.html">Privacidade</a> · <a href="/pages/terms.html">Termos</a>
</footer>

<script type="module">
  import { getRestaurants } from '/src/js/restaurants.js'
  import { initCookieBanner } from '/src/js/cookies.js'
  initCookieBanner()

  const CUISINES = ['Portuguesa','Nepalesa','Indiana','Italiana','Japonesa','Chinesa',
    'Mediterrânea','Grelhados','Marisco','Fusão','Americana','Francesa','Espanhola',
    'Vegana','Petiscos','Contemporânea','Brasileira','Árabe','Tailandesa','Mexicana']

  const CUISINE_ICONS = {
    'Portuguesa':'🍖','Nepalesa':'🏔️','Indiana':'🍛','Italiana':'🍝','Japonesa':'🍣',
    'Chinesa':'🥢','Mediterrânea':'🫒','Grelhados':'🥩','Marisco':'🦞','Fusão':'🌏',
    'Americana':'🍔','Francesa':'🥐','Espanhola':'🥘','Vegana':'🥗','Petiscos':'🫙',
    'Contemporânea':'✨','Brasileira':'🌿','Árabe':'🧆','Tailandesa':'🌶️','Mexicana':'🌮'
  }

  let all = [], activeCuisine = ''

  // ── helpers (declared first so they're available before any await) ──────────
  function citySlug(city) {
    return (city ?? 'portugal').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, '-')
  }

  function render(list) {
    document.getElementById('results-count').textContent = `${list.length} restaurante${list.length !== 1 ? 's' : ''}`
    const grid = document.getElementById('restaurants-grid')
    if (!list.length) {
      grid.innerHTML = '<p style="color:var(--muted)">Nenhum resultado encontrado.</p>'
      return
    }
    grid.innerHTML = list.map(r => `
      <a class="card" href="/restaurante/${citySlug(r.city)}/${r.slug}">
        <div class="card-img" style="${r.cover_image ? `background-image:url(${r.cover_image})` : ''}"></div>
        <div class="card-body">
          <div class="card-name">${r.name}</div>
          <div class="card-meta">
            <span>${r.cuisine_type ?? ''}</span>
            <span class="badge">${r.price_range ?? '€€'}</span>
            <span>${r.city}</span>
          </div>
        </div>
      </a>
    `).join('')
  }

  function applyFilters() {
    const q = document.getElementById('search').value.toLowerCase()
    const price = document.getElementById('price-filter').value
    const filtered = all.filter(r => {
      const matchCuisine = !activeCuisine || r.cuisine_type === activeCuisine || (r.cuisines ?? []).includes(activeCuisine)
      const matchSearch = !q || r.name.toLowerCase().includes(q) || (r.cuisine_type ?? '').toLowerCase().includes(q)
      const matchPrice = !price || r.price_range === price
      return matchCuisine && matchSearch && matchPrice
    })
    render(filtered)
  }
  window.applyFilters = applyFilters  // expose for HTML onchange="applyFilters()"

  function hideSuggestions() { document.getElementById('suggestions').classList.remove('open') }

  function showSuggestions(q) {
    const sugEl = document.getElementById('suggestions')
    if (!q || q.length < 1) { hideSuggestions(); return }
    const ql = q.toLowerCase()

    const matchRests = all.filter(r => r.name.toLowerCase().includes(ql)).slice(0, 6)
    const matchCuisines = CUISINES.filter(c => c.toLowerCase().includes(ql)).slice(0, 3)

    if (!matchRests.length && !matchCuisines.length) { hideSuggestions(); return }

    let html = ''
    if (matchRests.length) {
      html += `<div class="sug-section">
        <div class="sug-label">Restaurantes</div>
        ${matchRests.map(r => `
          <div class="sug-item" onclick="window._goRestaurant('${citySlug(r.city)}','${r.slug}')">
            <div class="sug-thumb" style="${r.cover_image ? `background-image:url(${r.cover_image})` : ''}"></div>
            <div class="sug-info">
              <div class="sug-name">${r.name}</div>
              <div class="sug-meta">${[r.cuisine_type, r.city].filter(Boolean).join(' · ')}</div>
            </div>
          </div>`).join('')}
      </div>`
    }
    if (matchCuisines.length) {
      html += `<div class="sug-section">
        <div class="sug-label">Cozinhas</div>
        ${matchCuisines.map(c => `
          <div class="sug-item" onclick="window._filterByCuisine('${c}')">
            <span class="sug-icon">${CUISINE_ICONS[c] ?? '🍽️'}</span>
            <div class="sug-info">
              <div class="sug-name">${c}</div>
              <div class="sug-meta">ver todos os restaurantes</div>
            </div>
          </div>`).join('')}
      </div>`
    }
    sugEl.innerHTML = html
    sugEl.classList.add('open')
  }

  // ── Build cuisine chips ──────────────────────────────────────────────────────
  const chipsEl = document.getElementById('cuisine-chips')
  chipsEl.innerHTML = '<div class="chip active" data-cuisine="">Todos</div>' +
    CUISINES.map(c => `<div class="chip" data-cuisine="${c}">${c}</div>`).join('')

  // Check URL param for cuisine pre-filter
  const urlCuisine = new URLSearchParams(location.search).get('cuisine')
  if (urlCuisine) {
    activeCuisine = urlCuisine
    chipsEl.querySelectorAll('.chip').forEach(c => {
      c.classList.toggle('active', c.dataset.cuisine === urlCuisine)
    })
  }

  // ── Load restaurants ─────────────────────────────────────────────────────────
  const { restaurants } = await getRestaurants()
  all = restaurants ?? []
  applyFilters()

  // ── Event listeners ──────────────────────────────────────────────────────────
  chipsEl.addEventListener('click', (e) => {
    const chip = e.target.closest('.chip')
    if (!chip) return
    chipsEl.querySelectorAll('.chip').forEach(c => c.classList.remove('active'))
    chip.classList.add('active')
    activeCuisine = chip.dataset.cuisine
    hideSuggestions()
    applyFilters()
  })

  const searchEl = document.getElementById('search')
  searchEl.addEventListener('input', () => {
    const q = searchEl.value.trim()
    if (!q) applyFilters()
    showSuggestions(q)
  })
  searchEl.addEventListener('focus', () => { if (searchEl.value.trim()) showSuggestions(searchEl.value.trim()) })
  document.addEventListener('click', (e) => { if (!e.target.closest('.search-wrap')) hideSuggestions() })
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') hideSuggestions()
    if (e.key === 'Enter' && searchEl === document.activeElement) {
      hideSuggestions()
      applyFilters()
    }
  })

  window._goRestaurant = function(city, slug) {
    window.location.href = `/restaurante/${city}/${slug}`
  }

  window._filterByCuisine = function(cuisine) {
    activeCuisine = cuisine
    searchEl.value = ''
    chipsEl.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.cuisine === cuisine))
    hideSuggestions()
    applyFilters()
  }
</script>

<!-- PWA Service Worker -->
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {})</script>

</body>
</html>
