<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sem ligação — Da Mesa</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#faf7f2; --text:#1c1612; --muted:#7a6a5e; --accent:#c0392b; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }
    .logo { font-family: Georgia, serif; font-size: 28px; margin-bottom: 40px; }
    .logo span { color: var(--accent); }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-family: Georgia, serif; font-size: 22px; font-weight: normal; margin-bottom: 10px; }
    p { color: var(--muted); font-size: 15px; line-height: 1.6; max-width: 320px; margin-bottom: 32px; }
    button {
      padding: 13px 28px; background: var(--text); color: #fff;
      border: none; border-radius: 10px; font-size: 15px; cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="logo">Da <span>Mesa</span></div>
  <div class="icon">📶</div>
  <h1>Sem ligação à internet</h1>
  <p>Verifica a tua ligação e tenta novamente. As tuas reservas estão guardadas.</p>
  <button onclick="location.reload()">Tentar novamente</button>
</body>
</html>
