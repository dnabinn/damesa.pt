name: Booking Reminders

on:
  schedule:
    # Runs every 15 minutes — edge function handles deduplication via reminder_sent flag
    - cron: '*/15 * * * *'
  workflow_dispatch:  # allow manual trigger from GitHub Actions UI

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger send-booking-reminders edge function
        run: |
          curl -s -X POST \
            https://jdkbywroucgwrfpirloa.supabase.co/functions/v1/send-booking-reminders \
            -H "Authorization: Bearer sb_publishable_rU5h79iwvA6wDozm72uvMg_zSFZAkkY" \
            -H "apikey: sb_publishable_rU5h79iwvA6wDozm72uvMg_zSFZAkkY" \
            -H "Content-Type: application/json" \
            -d '{}' \
            | jq .
