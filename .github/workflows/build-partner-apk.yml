name: Build Partner AAB

on:
  push:
    branches:
      - main
    paths:
      - 'partner/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-35"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > partner/partner.keystore

      - name: Fix Gradle properties
        run: |
          echo "org.gradle.jvmargs=-Xmx2048m" > partner/gradle.properties
          echo "android.useAndroidX=true" >> partner/gradle.properties
          echo "android.enableJetifier=true" >> partner/gradle.properties
          echo "kotlin.code.style=official" >> partner/gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Generate Gradle wrapper
        working-directory: partner
        run: |
          gradle wrapper --gradle-version 8.2 --distribution-type bin
          chmod +x gradlew

      - name: Build release AAB
        working-directory: partner
        run: ./gradlew bundleRelease
        env:
          KEYSTORE_PATH: partner.keystore
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Copy AAB to root
        run: cp partner/app/build/outputs/bundle/release/app-release.aab damesa-partner.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: damesa-partner-aab
          path: damesa-partner.aab
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: partner-aab-${{ github.run_number }}
          name: "DaMesa Partner v${{ github.run_number }}"
          body: |
            Auto-built from commit ${{ github.sha }}

            **Upload `damesa-partner.aab` to Google Play Console (Internal Testing → Production)**
          files: damesa-partner.aab
          make_latest: true
