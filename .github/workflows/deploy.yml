name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/CLAUDE.md
            **/sql/**
            **/supabase/**
            **/.github/**
            **/.claude/**
            **/.gradle/**
            **/app/**
            **/gradle/**
            **/build.gradle
            **/gradlew
            **/gradlew.bat
            **/settings.gradle
            **/gradle.properties
            **/local.properties
            **/twa-manifest.json
            **/*.keystore
            **/*.apk
            **/generate-icons-pure.js
